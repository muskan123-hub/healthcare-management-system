<!DOCTYPE html>
<html>
	<head>
	<meta charset="UTF-8">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<title>Healthcare Management System</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:20px;
}

h1{
text-align:center;
color:#2c3e50;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0px 0px 5px lightgray;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table,th,td{
border:1px solid #ddd;
}

th{
background:#3498db;
color:white;
padding:10px;
}

td{
padding:8px;
text-align:center;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}
</style>

</head>
<body class="container mt-4">

	<h1 class="text-center mb-4">
	Healthcare Management System
	</h1>
	<div style="display:flex;gap:20px;margin-bottom:20px;">

	<div class="section" style="flex:1;text-align:center;">
	<h3>Total Doctors</h3>
	<h2 id="doctorCount">0</h2>
	</div>

	<div class="section" style="flex:1;text-align:center;">
	<h3>Total Patients</h3>
	<h2 id="patientCount">0</h2>
	</div>

	<div class="section" style="flex:1;text-align:center;">
	<h3>Total Appointments</h3>
	<h2 id="appointmentCount">0</h2>
	</div>

	</div>



<h2>Doctor Management</h2>

<input type="text" id="doctorName" placeholder="Doctor Name">
<input type="text" id="specialization" placeholder="Specialization">
<input type="number" id="experience" placeholder="Experience">

<button onclick="addDoctor()">Add Doctor</button>
<button onclick="loadDoctors()">View Doctors</button>
<br><br>

<input type="text"
id="searchSpecialization"
placeholder="Search Specialization">

<button onclick="searchDoctor()">
Search
</button>

<table id="doctorTable">
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Action</th>
</tr>
</table>

</div>

<div class="section">

<h2>Patient Management</h2>

<input type="text" id="patientName" placeholder="Patient Name">
<input type="number" id="age" placeholder="Age">
<input type="text" id="gender" placeholder="Gender">
<input type="text" id="phone" placeholder="Phone Number">

<button onclick="addPatient()">Add Patient</button>
<button onclick="loadPatients()">View Patients</button>

<table id="patientTable">
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Action</th>
</tr>
</table>

</div>

<div class="section">

<h2>Appointment Management</h2>

<input type="text" id="doctorAppointment" placeholder="Doctor Name">
<input type="text" id="patientAppointment" placeholder="Patient Name">
<input type="date" id="appointmentDate">

<select id="status">
<option value="Booked">Booked</option>
<option value="Completed">Completed</option>
<option value="Cancelled">Cancelled</option>
</select>
<button onclick="addAppointment()">Book Appointment</button>
<button onclick="loadAppointments()">View Appointments</button>

<table id="appointmentTable">
<tr>
<th>ID</th>
<th>Doctor</th>
<th>Patient</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

</div>

<script>

function addDoctor(){

fetch('/doctors',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('doctorName').value,
specialization:document.getElementById('specialization').value,
experience:parseInt(document.getElementById('experience').value)
})
})
.then(()=>loadDoctors());

}

function loadDoctors(){

fetch('/doctors')
.then(res=>res.json())
.then(data=>{
	document.getElementById("doctorCount").innerHTML =
	data.length;
let table=document.getElementById('doctorTable');

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Action</th>
</tr>`;

data.forEach(d=>{

table.innerHTML+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.specialization}</td>
<td>${d.experience}</td>
<td>
<button onclick="deleteDoctor(${d.id})">Delete</button>
</td>
</tr>`;

});

});

}

function deleteDoctor(id){

fetch('/doctors/'+id,{
method:'DELETE'
})
.then(()=>loadDoctors());

}

function addPatient(){

fetch('/patients',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('patientName').value,
age:parseInt(document.getElementById('age').value),
gender:document.getElementById('gender').value,
phoneNumber:document.getElementById('phone').value
})
})
.then(()=>loadPatients());

}

function loadPatients(){

fetch('/patients')
.then(res=>res.json())
.then(data=>{
	document.getElementById("patientCount").innerHTML =
	data.length;

let table=document.getElementById('patientTable');

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Action</th>
</tr>`;

data.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.name}</td>
<td>${p.age}</td>
<td>${p.gender}</td>
<td>${p.phoneNumber}</td>
<td>
<button onclick="deletePatient(${p.id})">Delete</button>
</td>
</tr>`;

});

});

}

function deletePatient(id){

fetch('/patients/'+id,{
method:'DELETE'
})
.then(()=>loadPatients());

}

function addAppointment(){

fetch('/appointments',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
doctorName:document.getElementById('doctorAppointment').value,
patientName:document.getElementById('patientAppointment').value,
appointmentDate:document.getElementById('appointmentDate').value,
status:document.getElementById('status').value
})
})
.then(()=>loadAppointments());

}

function loadAppointments(){

fetch('/appointments')
.then(res=>res.json())
.then(data=>{
	document.getElementById("appointmentCount").innerHTML =
	data.length;
let table=document.getElementById('appointmentTable');

table.innerHTML=`
<tr>
<th>ID</th>
<th>Doctor</th>
<th>Patient</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>`;

data.forEach(a=>{

table.innerHTML+=`
<tr>
<td>${a.id}</td>
<td>${a.doctorName}</td>
<td>${a.patientName}</td>
<td>${a.appointmentDate}</td>
<td>

${a.status=="Booked"
? '<span style="color:orange;font-weight:bold;">Booked</span>'
: a.status=="Completed"
? '<span style="color:green;font-weight:bold;">Completed</span>'
: '<span style="color:red;font-weight:bold;">Cancelled</span>'
}

</td>
<td>
<button onclick="deleteAppointment(${a.id})">Delete</button>
</td>
</tr>`;

});

});

}

function deleteAppointment(id){

fetch('/appointments/'+id,{
method:'DELETE'
})
.then(()=>loadAppointments());

}
function searchDoctor(){

let spec =
document.getElementById(
'searchSpecialization'
).value;

fetch('/doctors/search?specialization=' + spec)
.then(res=>res.json())
.then(data=>{

let table =
document.getElementById('doctorTable');

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Action</th>
</tr>`;

data.forEach(d=>{

table.innerHTML+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.specialization}</td>
<td>${d.experience}</td>
<td>
<button onclick="deleteDoctor(${d.id})">
Delete
</button>
</td>
</tr>`;

});

});

}

loadDoctors();
loadPatients();
loadAppointments();

</script>

</body>
</html>
